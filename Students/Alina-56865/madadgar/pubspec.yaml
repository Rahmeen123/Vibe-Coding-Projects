name: madadgar
description: A hyperlocal errand assistance app connecting users with nearby helpers.
publish_to: 'none' # Remove this line if you want to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: ">=2.12.0 <3.0.0"
  flutter: ">=2.0.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.0.0
  firebase_auth: ^3.0.0
  cloud_firestore: ^3.0.0
  firebase_storage: ^10.0.0
  firebase_messaging: ^11.0.0
  geolocator: ^8.0.0
  google_maps_flutter: ^2.0.0
  geo_flutter_fire: ^3.0.0
  provider: ^6.0.0
  riverpod: ^1.0.0
  intl: ^0.17.0
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.0.0
  json_serializable: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  fonts:
    - family: Noto Nastaliq Urdu
      fonts:
        - asset: assets/fonts/NotoNastaliqUrdu-Regular.ttf

# Additional configurations can be added as needed.